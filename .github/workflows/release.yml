name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: 'temurin' }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.1', bundler-cache: true }
      - uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > stories-keystore.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<PROPS
          storeFile=../stories-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          PROPS

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Upload R8 mapping to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: https://de.sentry.io/
        run: |
          npx --yes @sentry/cli upload-proguard \
            --org neuron-ai \
            --project stories \
            "$(pwd)/app/build/outputs/mapping/release/mapping.txt"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Create Play Store key
        run: printenv PLAY_KEY > fastlane/play-store-key.json
        env:
          PLAY_KEY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Release to production
        run: bundle exec fastlane android release

      - name: Cleanup
        if: always()
        run: rm -f fastlane/play-store-key.json stories-keystore.jks keystore.properties

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: app/build/outputs/bundle/release/app-release.aab
